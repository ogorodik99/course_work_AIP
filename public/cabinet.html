<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет – МедЗапись</title>
    <link rel="shortcut icon" href="img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top scrolled">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
            <div class="brand-icon"><i class="bi bi-heart-pulse-fill"></i></div>
            <span class="brand-text">МедЗапись</span>
        </a>
        <div class="d-flex gap-2 align-items-center">
            <span class="text-muted-custom d-none d-md-inline" id="user-greeting"></span>
            <a href="booking.html" class="btn btn-accent btn-sm"><i class="bi bi-calendar-plus me-1"></i> Записаться</a>
            <a href="../backend/logout.php" class="btn btn-outline-danger btn-sm">Выход</a>
        </div>
    </div>
</nav>

<main class="page-content">
    <div class="container">
        <div class="page-header">
            <h1><i class="bi bi-person-circle me-2"></i>Личный кабинет</h1>
        </div>

        <!-- Навигация -->
        <div class="cabinet-tabs mb-4">
            <button class="cab-tab active" onclick="showTab('upcoming')">
                <i class="bi bi-calendar-event"></i> Предстоящие
            </button>
            <button class="cab-tab" onclick="showTab('history')">
                <i class="bi bi-clock-history"></i> История
            </button>
            <button class="cab-tab" onclick="showTab('medcard')">
                <i class="bi bi-file-earmark-medical"></i> Медкарта
            </button>
            <button class="cab-tab" onclick="showTab('profile')">
                <i class="bi bi-gear"></i> Профиль
            </button>
        </div>

        <!-- Предстоящие записи -->
        <div id="tab-upcoming" class="tab-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="tab-title">Предстоящие записи</h3>
                <a href="booking.html" class="btn btn-accent btn-sm"><i class="bi bi-plus me-1"></i> Новая запись</a>
            </div>
            <div id="upcoming-list">
                <div class="text-center py-4"><div class="spinner-border text-info"></div></div>
            </div>
        </div>

        <!-- История -->
        <div id="tab-history" class="tab-content" style="display:none;">
            <h3 class="tab-title mb-3">История посещений</h3>
            <div id="history-list">
                <div class="text-center py-4"><div class="spinner-border text-info"></div></div>
            </div>
        </div>

        <!-- Медкарта -->
        <div id="tab-medcard" class="tab-content" style="display:none;">
            <h3 class="tab-title mb-3">Медицинская карта</h3>
            <div id="medcard-content">
                <div class="text-center py-4"><div class="spinner-border text-info"></div></div>
            </div>
        </div>

        <!-- Профиль -->
        <div id="tab-profile" class="tab-content" style="display:none;">
            <h3 class="tab-title mb-3">Мой профиль</h3>
            <div class="glass-card">
                <form id="profile-form">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label-custom">ФИО</label>
                            <input type="text" class="form-control-dark" id="prof-fullname" placeholder="Иванов Иван Иванович">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Телефон</label>
                            <input type="tel" class="form-control-dark" id="prof-phone" placeholder="+7 (999) 123-45-67">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Дата рождения</label>
                            <input type="date" class="form-control-dark" id="prof-birthdate">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Полис ОМС</label>
                            <input type="text" class="form-control-dark" id="prof-insurance" placeholder="Номер полиса">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Группа крови</label>
                            <select class="form-control-dark" id="prof-blood">
                                <option value="">Не указана</option>
                                <option>I (O)+</option><option>I (O)−</option>
                                <option>II (A)+</option><option>II (A)−</option>
                                <option>III (B)+</option><option>III (B)−</option>
                                <option>IV (AB)+</option><option>IV (AB)−</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label-custom">Аллергии</label>
                            <textarea class="form-control-dark" id="prof-allergies" rows="2" placeholder="Перечислите известные аллергии..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label-custom">Хронические заболевания</label>
                            <textarea class="form-control-dark" id="prof-chronic" rows="2" placeholder="Перечислите хронические заболевания..."></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-accent mt-4"><i class="bi bi-check2 me-2"></i>Сохранить</button>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = '../backend/api';

function showTab(name) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.getElementById(`tab-${name}`).style.display = 'block';
    document.querySelectorAll('.cab-tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');

    if (name === 'medcard') loadMedCard();
    if (name === 'profile') loadProfile();
}

// Загрузка записей
async function loadAppointments() {
    try {
        const res = await fetch(`${API}/appointments.php?action=my`);
        const json = await res.json();

        if (!json.success) return;

        const today = new Date().toISOString().split('T')[0];
        const upcoming = json.data.filter(a => a.appointment_date >= today && a.status !== 'cancelled');
        const history = json.data.filter(a => a.appointment_date < today || a.status === 'cancelled' || a.status === 'completed');

        document.getElementById('upcoming-list').innerHTML = upcoming.length > 0
            ? upcoming.map(a => appointmentCard(a, true)).join('')
            : emptyState('Нет предстоящих записей', 'calendar-x');

        document.getElementById('history-list').innerHTML = history.length > 0
            ? history.map(a => appointmentCard(a, false)).join('')
            : emptyState('История посещений пуста', 'clock-history');
    } catch(e) {
        document.getElementById('upcoming-list').innerHTML = '<p class="text-danger">Ошибка загрузки</p>';
    }
}

function appointmentCard(a, canCancel) {
    const statusMap = {
        'pending': { text: 'Ожидание', class: 'warning' },
        'confirmed': { text: 'Подтверждено', class: 'success' },
        'completed': { text: 'Завершено', class: 'info' },
        'cancelled': { text: 'Отменено', class: 'danger' }
    };
    const st = statusMap[a.status] || statusMap.pending;
    const dateStr = new Date(a.appointment_date).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    const timeStr = a.appointment_time.substring(0, 5);

    return `
        <div class="appointment-card">
            <div class="appointment-info">
                <div class="appointment-date">
                    <i class="bi bi-calendar3"></i> ${dateStr}
                    <span class="appointment-time"><i class="bi bi-clock"></i> ${timeStr}</span>
                </div>
                <div class="appointment-doctor">
                    <strong>${a.doctor_name}</strong> · ${a.specialization_name}
                    ${a.cabinet ? ` · Каб. ${a.cabinet}` : ''}
                </div>
                ${a.reason ? `<div class="appointment-reason">${a.reason}</div>` : ''}
            </div>
            <div class="appointment-actions">
                <span class="status-badge status-${st.class}">${st.text}</span>
                ${canCancel && a.status !== 'cancelled' ? `<button class="btn btn-outline-danger btn-sm" onclick="cancelAppointment(${a.id})"><i class="bi bi-x-circle"></i> Отменить</button>` : ''}
            </div>
        </div>
    `;
}

function emptyState(text, icon) {
    return `<div class="empty-state"><i class="bi bi-${icon}"></i><p>${text}</p><a href="booking.html" class="btn btn-accent btn-sm mt-2">Записаться на приём</a></div>`;
}

async function cancelAppointment(id) {
    if (!confirm('Вы уверены, что хотите отменить запись?')) return;
    try {
        await fetch(`${API}/appointments.php`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, status: 'cancelled' })
        });
        loadAppointments();
    } catch(e) {
        alert('Ошибка при отмене записи');
    }
}

// Медкарта
async function loadMedCard() {
    try {
        const res = await fetch(`${API}/medical_card.php`);
        const json = await res.json();

        if (!json.success) {
            document.getElementById('medcard-content').innerHTML = '<p class="text-muted-custom">Медкарта не найдена</p>';
            return;
        }

        const card = json.card;
        const records = json.records;

        let html = `
            <div class="glass-card mb-4">
                <h5><i class="bi bi-person-vcard me-2"></i>Данные пациента</h5>
                <div class="info-grid">
                    <div class="info-item"><span class="info-label">ФИО</span><span>${card.full_name || '—'}</span></div>
                    <div class="info-item"><span class="info-label">Дата рождения</span><span>${card.birth_date ? new Date(card.birth_date).toLocaleDateString('ru-RU') : '—'}</span></div>
                    <div class="info-item"><span class="info-label">Группа крови</span><span>${card.blood_type || '—'}</span></div>
                    <div class="info-item"><span class="info-label">Полис ОМС</span><span>${card.insurance_number || '—'}</span></div>
                    <div class="info-item"><span class="info-label">Аллергии</span><span>${card.allergies || '—'}</span></div>
                    <div class="info-item"><span class="info-label">Хронические заболевания</span><span>${card.chronic_diseases || '—'}</span></div>
                </div>
            </div>
        `;

        if (records.length > 0) {
            html += `<h5 class="mb-3"><i class="bi bi-journal-medical me-2"></i>История посещений</h5>`;
            html += records.map(r => `
                <div class="glass-card mb-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <strong>${r.doctor_name}</strong> · ${r.specialization_name}
                            <br><small class="text-muted-custom">${new Date(r.record_date).toLocaleDateString('ru-RU')}</small>
                        </div>
                    </div>
                    ${r.diagnosis ? `<div class="mt-2"><span class="info-label">Диагноз:</span> ${r.diagnosis}</div>` : ''}
                    ${r.treatment ? `<div class="mt-1"><span class="info-label">Лечение:</span> ${r.treatment}</div>` : ''}
                    ${r.prescriptions ? `<div class="mt-1"><span class="info-label">Рецепты:</span> ${r.prescriptions}</div>` : ''}
                </div>
            `).join('');
        } else {
            html += emptyState('Нет записей в медкарте', 'journal-medical');
        }

        document.getElementById('medcard-content').innerHTML = html;
    } catch(e) {
        document.getElementById('medcard-content').innerHTML = '<p class="text-danger">Ошибка загрузки медкарты</p>';
    }
}

// Профиль
async function loadProfile() {
    try {
        const res = await fetch(`${API}/medical_card.php`);
        const json = await res.json();
        if (json.success) {
            const c = json.card;
            document.getElementById('prof-fullname').value = c.full_name || '';
            document.getElementById('prof-phone').value = c.phone || '';
            document.getElementById('prof-birthdate').value = c.birth_date || '';
            document.getElementById('prof-insurance').value = c.insurance_number || '';
            document.getElementById('prof-blood').value = c.blood_type || '';
            document.getElementById('prof-allergies').value = c.allergies || '';
            document.getElementById('prof-chronic').value = c.chronic_diseases || '';
        }
    } catch(e) {}
}

document.getElementById('profile-form')?.addEventListener('submit', async function(e) {
    e.preventDefault();
    try {
        const res = await fetch(`${API}/medical_card.php`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                full_name: document.getElementById('prof-fullname').value,
                phone: document.getElementById('prof-phone').value,
                birth_date: document.getElementById('prof-birthdate').value,
                insurance_number: document.getElementById('prof-insurance').value,
                blood_type: document.getElementById('prof-blood').value,
                allergies: document.getElementById('prof-allergies').value,
                chronic_diseases: document.getElementById('prof-chronic').value
            })
        });
        const json = await res.json();
        if (json.success) {
            alert('Данные сохранены!');
        }
    } catch(e) {
        alert('Ошибка сохранения');
    }
});

// Инициализация
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch(`${API}/session_check.php`);
        const json = await res.json();
        if (json.authorized) {
            document.getElementById('user-greeting').textContent = `Привет, ${json.full_name}!`;
        }
    } catch(e) {}
    loadAppointments();
});
</script>
</body>
</html>
